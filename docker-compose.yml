services:
  tesla-exporter:
    container_name: tesla-exporter
    build: .
    volumes:
      - ./data:/data
    env_file:
      - .env
    ports:
      - "9998:9998"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9998/metrics', timeout=5)"]
      interval: 60s
      timeout: 10s
      retries: 3
      start_period: 30s
    labels:
      - "autoheal=true"
    networks:
      - monitoring

networks:
  monitoring:
    external: true
    name: monitoring_monitoring
